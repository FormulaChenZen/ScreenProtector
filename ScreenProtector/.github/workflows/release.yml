name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.0.0). If empty, uses tag or 0.0.0.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version
      id: version
      shell: bash
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF_NAME#v}"
        else
          VERSION="0.0.0"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Resolved version: $VERSION"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish (self-contained, win-x64)
      run: >
        dotnet publish ScreenProtector.csproj
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishSingleFile=false
        -p:PublishReadyToRun=false
        -p:Version=${{ steps.version.outputs.version }}
        -p:AssemblyVersion=${{ steps.version.outputs.version }}
        -p:FileVersion=${{ steps.version.outputs.version }}
        -o bin/Release/net8.0-windows/win-x64/publish

    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress

    - name: Build installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} installer/ScreenProtector.iss
        dir installer/Output

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScreenProtector-Setup-${{ steps.version.outputs.version }}
        path: installer/Output/ScreenProtector-Setup-*.exe
        if-no-files-found: error

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: installer/Output/ScreenProtector-Setup-*.exe
        name: ${{ github.ref_name }}
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
