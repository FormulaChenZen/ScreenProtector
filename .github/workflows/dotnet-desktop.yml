name: Build and Release WPF Application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build
      run: dotnet publish ScreenProtector/ScreenProtector.csproj --configuration Release --output ./publish --runtime win-x64 --self-contained false

    - name: Compress artifacts
      run: Compress-Archive -Path ./publish/* -DestinationPath ./ScreenProtector-win-x64.zip -Force

    - name: Release
      if: github.event_name == 'push'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        sha="${GITHUB_SHA:0:8}"
        gh release create "v$sha" ScreenProtector-win-x64.zip --latest || true